<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="UN.BOUND - Streetwear e-commerce design system">
  <defs>
    <linearGradient id="ubBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#ubBg)"/>

  <!-- Phone mockup -->
  <g transform="translate(60, 50)">
    <rect width="220" height="300" rx="22" fill="#16213c" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="14" y="14" width="192" height="272" rx="8" fill="#0f172a"/>

    <!-- Header -->
    <text x="110" y="42" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC" letter-spacing="3">UN.BOUND</text>
    <line x1="20" y1="55" x2="200" y2="55" stroke="#38BDF8" stroke-opacity="0.3"/>

    <!-- Product image placeholder -->
    <rect x="30" y="70" width="160" height="120" rx="4" fill="#1e293b"/>
    <text x="110" y="135" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#94A3B8">Streetwear Tee</text>

    <!-- Product info -->
    <text x="30" y="210" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">Oversized Tee — Onyx</text>
    <text x="30" y="228" font-family="Inter, sans-serif" font-size="10" fill="#38BDF8">₱ 1,290.00</text>

    <!-- Add to cart -->
    <rect x="30" y="245" width="160" height="28" rx="4" fill="#2563EB"/>
    <text x="110" y="263" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" font-weight="600" fill="#F8FAFC">ADD TO CART</text>
  </g>

  <!-- Color swatches -->
  <g transform="translate(340, 70)">
    <text x="0" y="0" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">DESIGN SYSTEM</text>
    <text x="0" y="30" font-family="Poppins, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">20 screens</text>
    <text x="0" y="55" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">Light &amp; dark variants</text>

    <!-- Swatches -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="40" height="40" rx="6" fill="#0f172a" stroke="#38BDF8" stroke-opacity="0.3"/>
      <rect x="50" y="0" width="40" height="40" rx="6" fill="#2563EB"/>
      <rect x="100" y="0" width="40" height="40" rx="6" fill="#38BDF8"/>
      <rect x="150" y="0" width="40" height="40" rx="6" fill="#F8FAFC"/>
      <rect x="200" y="0" width="40" height="40" rx="6" fill="#ef4444"/>
    </g>

    <!-- Typography spec -->
    <text x="0" y="160" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">TYPOGRAPHY</text>
    <text x="0" y="190" font-family="Poppins, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Poppins / Inter</text>
    <text x="0" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Display · Body · Caption</text>
  </g>

  <!-- Badge -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" rx="4" ry="4" width="140" height="22" fill="#2563EB"/>
    <text x="70" y="15" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">UI/UX Case Study</text>
  </g>
</svg>
