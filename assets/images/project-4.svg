<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="This Portfolio - JSON-driven personal site">
  <defs>
    <linearGradient id="pfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#pfBg)"/>

  <!-- Code editor window -->
  <g transform="translate(60, 50)">
    <rect width="480" height="300" rx="10" fill="#16213c" stroke="#38BDF8" stroke-opacity="0.3" stroke-width="1"/>
    <rect width="480" height="34" rx="10" fill="#1e293b"/>
    <circle cx="22" cy="17" r="5" fill="#ef4444"/>
    <circle cx="38" cy="17" r="5" fill="#f59e0b"/>
    <circle cx="54" cy="17" r="5" fill="#22c55e"/>
    <text x="240" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#94A3B8">data.json — portfolio</text>

    <!-- File tabs -->
    <g transform="translate(0, 34)">
      <rect width="80" height="24" fill="#0f172a"/>
      <text x="40" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#38BDF8">data.json</text>
    </g>

    <!-- JSON content -->
    <g font-family="'Courier New', monospace" font-size="12" transform="translate(20, 80)">
      <text x="0" y="0" fill="#94A3B8">{</text>
      <text x="20" y="20" fill="#94A3B8">"personal": {</text>
      <text x="40" y="40" fill="#94A3B8">"name":</text>
      <text x="110" y="40" fill="#38BDF8">"Prian Andrei"</text>
      <text x="220" y="40" fill="#94A3B8">,</text>
      <text x="40" y="60" fill="#94A3B8">"role":</text>
      <text x="110" y="60" fill="#38BDF8">"BSIT Student"</text>
      <text x="220" y="60" fill="#94A3B8">,</text>
      <text x="40" y="80" fill="#94A3B8">"projects": [</text>
      <text x="60" y="100" fill="#94A3B8">{ "title":</text>
      <text x="160" y="100" fill="#38BDF8">"This Portfolio"</text>
      <text x="280" y="100" fill="#94A3B8">},</text>
      <text x="60" y="120" fill="#94A3B8">{ "title":</text>
      <text x="160" y="120" fill="#38BDF8">"..."</text>
      <text x="220" y="120" fill="#94A3B8">}</text>
      <text x="40" y="140" fill="#94A3B8">]</text>
      <text x="20" y="160" fill="#94A3B8">}</text>
      <text x="0" y="180" fill="#94A3B8">}</text>

      <!-- Cursor -->
      <rect x="240" y="190" width="7" height="14" fill="#38BDF8">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Badge -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" rx="4" ry="4" width="140" height="22" fill="#2563EB"/>
    <text x="70" y="15" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">Web Development</text>
  </g>
</svg>
