<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="BuildWeb Landing Page - responsive HTML/CSS">
  <defs>
    <linearGradient id="bwBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bwBg)"/>

  <!-- Browser frame -->
  <g transform="translate(60, 50)">
    <rect width="480" height="300" rx="8" fill="#16213c" stroke="#38BDF8" stroke-opacity="0.3"/>
    <rect width="480" height="28" rx="8" fill="#1e293b"/>
    <circle cx="16" cy="14" r="4" fill="#ef4444"/>
    <circle cx="28" cy="14" r="4" fill="#f59e0b"/>
    <circle cx="40" cy="14" r="4" fill="#22c55e"/>
    <rect x="100" y="6" width="280" height="16" rx="3" fill="#0f172a"/>
    <text x="240" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="#94A3B8">buildweb.course</text>

    <!-- Hero -->
    <text x="240" y="80" text-anchor="middle" font-family="Poppins, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">BuildWeb</text>
    <text x="240" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Learn to build the modern web</text>

    <!-- CTA -->
    <rect x="190" y="120" width="100" height="26" rx="4" fill="#2563EB"/>
    <text x="240" y="137" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" font-weight="600" fill="#F8FAFC">Start Learning</text>

    <!-- Feature cards -->
    <g transform="translate(30, 170)">
      <rect width="130" height="100" rx="6" fill="#0f172a" stroke="#38BDF8" stroke-opacity="0.2"/>
      <rect x="15" y="15" width="20" height="20" rx="3" fill="#2563EB"/>
      <rect x="15" y="45" width="100" height="6" rx="2" fill="#94A3B8" fill-opacity="0.5"/>
      <rect x="15" y="58" width="80" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
      <rect x="15" y="68" width="90" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
    </g>
    <g transform="translate(175, 170)">
      <rect width="130" height="100" rx="6" fill="#0f172a" stroke="#38BDF8" stroke-opacity="0.2"/>
      <rect x="15" y="15" width="20" height="20" rx="3" fill="#38BDF8"/>
      <rect x="15" y="45" width="100" height="6" rx="2" fill="#94A3B8" fill-opacity="0.5"/>
      <rect x="15" y="58" width="80" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
      <rect x="15" y="68" width="90" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
    </g>
    <g transform="translate(320, 170)">
      <rect width="130" height="100" rx="6" fill="#0f172a" stroke="#38BDF8" stroke-opacity="0.2"/>
      <rect x="15" y="15" width="20" height="20" rx="3" fill="#22c55e"/>
      <rect x="15" y="45" width="100" height="6" rx="2" fill="#94A3B8" fill-opacity="0.5"/>
      <rect x="15" y="58" width="80" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
      <rect x="15" y="68" width="90" height="4" rx="2" fill="#94A3B8" fill-opacity="0.3"/>
    </g>
  </g>

  <!-- Badge -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" rx="4" ry="4" width="140" height="22" fill="#2563EB"/>
    <text x="70" y="15" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">Web Development</text>
  </g>
</svg>
